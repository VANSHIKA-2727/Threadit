name: CD — Deploy to EC2

on:
  workflow_run:
    workflows:
      - "CI — Build Check"
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Threadit
            git pull origin main

            # Backend
            cd ~/Threadit/api
            npm install
            pm2 restart threadit-api

            # Frontend
            cd ~/Threadit/web
            npm install
            npm run build
            pm2 restart threadit-web